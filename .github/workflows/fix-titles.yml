name: Fix doubled title suffix
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fix-titles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove doubled title suffix
        run: |
          # Find all page.tsx and layout.tsx files EXCEPT the root layout
          # The root layout has template: '%s | ChargebackKit' which must stay
          find app -name "page.tsx" -o -name "layout.tsx" | while read file; do
            # Skip the root layout (app/layout.tsx)
            if [ "$file" = "app/layout.tsx" ]; then
              continue
            fi
            # Remove ' | ChargebackKit' from title and openGraph title values
            if grep -q "| ChargebackKit" "$file"; then
              sed -i 's/ | ChargebackKit//g' "$file"
              echo "Fixed: $file"
            fi
          done
      - name: Show changes
        run: git diff --stat
      - name: Commit and push
        run: |
          git config user.name "mattmcallister-create"
          git config user.email "mattmcallistermarketing@gmail.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix(seo): remove doubled title suffix from all pages

The root layout template already appends ' | ChargebackKit' via
the title template. Page-level titles should not include it."
            git push
          fi
